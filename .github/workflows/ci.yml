name: ci

on:
  push:
    branches:
      - main
      - dev
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.9.0
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install editor deps
        run: npm ci
      
      - name: Generate icons
        run: npm run generate-icons

      - name: Build (Tauri)
        run: npm run tauri:build

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: slate-editor-bundle-${{ matrix.os }}
          path: native/target/release/bundle/**
          if-no-files-found: error

