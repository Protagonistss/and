services:
  postgres:
    image: postgres:16-alpine
    container_name: slate-postgres
    environment:
      POSTGRES_DB: slate
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - slate-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: slate-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - slate-redis-data:/data

volumes:
  slate-postgres-data:
  slate-redis-data:
